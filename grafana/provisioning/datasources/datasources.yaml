apiVersion: 1

# prune: true removes datasources not defined here on startup
prune: true

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    orgId: 1
    uid: grafana_prometheus
    url: http://${PROMETHEUS_HOST}:${PROMETHEUS_PORT}
    isDefault: true
    jsonData:
      # Click an exemplar dot on a latency panel -> open the exact trace.
      # `trace_id` is the exemplar label set by the OTel -> Prometheus conversion.
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: grafana_tempo

  - name: Tempo
    type: tempo
    access: proxy
    orgId: 1
    uid: grafana_tempo
    url: http://${TEMPO_HOST}:${TEMPO_PORT}
    jsonData:
      # Trace -> logs for the same service around the span's time window
      tracesToLogsV2:
        datasourceUid: grafana_loki
        spanStartTimeShift: "-5m"
        spanEndTimeShift: "5m"
        filterByTraceID: true
        filterBySpanID: false
        tags:
          - key: service.name
            value: service_name
      # Trace -> RED metrics generated by the Alloy spanmetrics connector
      tracesToMetrics:
        datasourceUid: grafana_prometheus
        spanStartTimeShift: "-5m"
        spanEndTimeShift: "5m"
        queries:
          - name: Span p95 latency
            query: histogram_quantile(0.95, sum(rate(traces_spanmetrics_duration_seconds_bucket{$$__tags}[5m])) by (le))
          - name: Span error rate
            query: sum(rate(traces_spanmetrics_calls_total{$$__tags, status_code="STATUS_CODE_ERROR"}[5m]))
      # Service map from the Alloy servicegraph connector
      serviceMap:
        datasourceUid: grafana_prometheus
      nodeGraph:
        enabled: true
      lokiSearch:
        datasourceUid: grafana_loki

  - name: Loki
    type: loki
    access: proxy
    orgId: 1
    uid: grafana_loki
    url: http://${LOKI_HOST}:${LOKI_PORT}
    jsonData:
      # Log line -> trace. Covers both label-shaped and body-embedded trace IDs
      # (the OTel Loki exporter writes `traceid` into the JSON body).
      derivedFields:
        - name: TraceID
          datasourceUid: grafana_tempo
          matcherType: regex
          matcherRegex: '"?traceid"?[=:]"?(\w+)"?'
          url: "$${__value.raw}"
          urlDisplayLabel: View trace
        - name: TraceIDLabel
          datasourceUid: grafana_tempo
          matcherType: label
          matcherRegex: trace_id
          url: "$${__value.raw}"
          urlDisplayLabel: View trace
