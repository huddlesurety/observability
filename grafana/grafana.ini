[server]
root_url = ${ROOT_URL}

[auth.google]
enabled = true
client_id = ${AUTH_GOOGLE_CLIENT_ID}
client_secret = ${AUTH_GOOGLE_CLIENT_SECRET}
allowed_domains = ${AUTH_GOOGLE_ALLOWED_DOMAINS}
allow_assign_grafana_admin = true
role_attribute_path = "email == 'ethan@huddlesurety.co' && 'GrafanaAdmin' || 'Editor'"
role_attribute_strict = true
allow_assign_organization = true
auto_assign_org_role = Editor

[auth]
disable_login_form = true

[users]
allow_sign_up = false
