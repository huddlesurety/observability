stream_over_http_enabled: true

server:
  http_listen_port: ${PORT:-3200}
  # Required for internal query-frontend communication, not exposed externally
  grpc_listen_port: 9095

distributor:
  log_received_spans:
    enabled: true
  receivers:
    otlp:
      protocols:
        # Separate listener from the query API (PORT) — only the OTel Collector pushes here
        http:
          endpoint: "0.0.0.0:${OTLP_HTTP_PORT:-4318}"

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal

compactor:
  compaction:
    compaction_window: 1h
    # Keep trace blocks for 14d. Set explicitly (this is also Tempo's current
    # default) to document intent and stay aligned with the Loki 14d
    # retention_period. Time-based only — Tempo has no size cap, so the
    # /var/tempo volume must be able to hold 14 days of trace blocks.
    block_retention: 336h

# Enable the local-blocks processor, which powers TraceQL metrics
# (count_over_time / quantile_over_time / rate) used by the dashboards.
# Span-metrics and service-graph metrics are generated in Alloy and
# remote-written to Prometheus, so no remote_write is needed here.
metrics_generator:
  storage:
    path: /var/tempo/generator/wal # metrics-registry WAL (required even unused)
    remote_write: [] # Alloy owns span-metrics/service-graph remote_write
  # local-blocks builds its own trace blocks and needs a dedicated traces WAL,
  # distinct from storage.path and the ingester storage.trace.wal. Without it the
  # generator crash-loops: "local blocks processor requires traces wal".
  traces_storage:
    path: /var/tempo/generator/traces
  processor:
    local_blocks:
      # Keep non-SERVER spans (workflow/activity spans aren't SERVER-kind) so
      # TraceQL metrics can match them; default would drop them.
      filter_server_spans: false
      flush_to_storage: false

overrides:
  defaults:
    metrics_generator:
      processors:
        - local-blocks

# Allow the query path to serve TraceQL metrics queries.
query_frontend:
  metrics:
    max_duration: 24h
    concurrent_jobs: 8
