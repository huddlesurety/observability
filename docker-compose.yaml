# Railway template: import this file onto the Railway canvas to create all services.
# All inter-service communication uses Railway private networking (*.railway.internal).

services:
  prometheus:
    build:
      context: ./prometheus
      dockerfile: Dockerfile
      args:
        - VERSION=${PROMETHEUS_VERSION:-v3.5.1}
    volumes:
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:${PROMETHEUS_PORT:-9090}"
    environment:
      - OTEL_COLLECTOR_HOST=${OTEL_COLLECTOR_HOST:-otel-collector.railway.internal}
      - OTEL_COLLECTOR_PORT=${OTEL_COLLECTOR_PORT:-8889}
      - SCRAPE_INTERVAL=${SCRAPE_INTERVAL:-15s}
      - EVALUATION_INTERVAL=${EVALUATION_INTERVAL:-15s}
      - PORT=${PROMETHEUS_PORT:-9090}

  otel-collector:
    build:
      context: ./otel-collector
      dockerfile: Dockerfile
    ports:
      - "${OTEL_COLLECTOR_OTLP_PORT:-4318}:${OTEL_COLLECTOR_OTLP_PORT:-4318}"
      - "${OTEL_COLLECTOR_PROM_PORT:-8889}:${OTEL_COLLECTOR_PROM_PORT:-8889}"
    environment:
      - PORT=${OTEL_COLLECTOR_OTLP_PORT:-4318}
      - PROMETHEUS_EXPORTER_PORT=${OTEL_COLLECTOR_PROM_PORT:-8889}
      - HEALTH_CHECK_PORT=${OTEL_COLLECTOR_HEALTH_PORT:-13133}
      - TEMPO_ENDPOINT=${TEMPO_ENDPOINT:-http://tempo.railway.internal:4318}
      - LOKI_ENDPOINT=${LOKI_ENDPOINT:-http://loki.railway.internal:3100/otlp}

  tempo:
    build:
      context: ./tempo
      dockerfile: Dockerfile
      args:
        - VERSION=${TEMPO_VERSION:-2.10.0}
    volumes:
      - tempo_data:/var/tempo
    ports:
      - "${TEMPO_PORT:-3200}:${TEMPO_PORT:-3200}"
    environment:
      - PORT=${TEMPO_PORT:-3200}
      - OTLP_HTTP_PORT=${TEMPO_OTLP_HTTP_PORT:-4318}

  loki:
    build:
      context: ./loki
      dockerfile: Dockerfile
      args:
        - VERSION=${LOKI_VERSION:-3.6.5}
    volumes:
      - loki_data:/var/loki
    ports:
      - "${LOKI_PORT:-3100}:${LOKI_PORT:-3100}"
    environment:
      - PORT=${LOKI_PORT:-3100}

  grafana:
    build:
      context: ./grafana
      dockerfile: Dockerfile
      args:
        - VERSION=${GRAFANA_VERSION:-12.4.0}
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:${GRAFANA_PORT:-3000}"
    environment:
      - PROMETHEUS_HOST=${PROMETHEUS_HOST:-prometheus.railway.internal}
      - PROMETHEUS_PORT=${PROMETHEUS_PORT:-9090}
      - TEMPO_HOST=${TEMPO_HOST:-tempo.railway.internal}
      - TEMPO_PORT=${TEMPO_PORT:-3200}
      - LOKI_HOST=${LOKI_HOST:-loki.railway.internal}
      - LOKI_PORT=${LOKI_PORT:-3100}
      - PROTOCOL=${GRAFANA_PROTOCOL:-http}
      - DOMAIN=${GRAFANA_DOMAIN:-localhost}
      - PORT=${GRAFANA_PORT:-3000}
      - ROOT_URL=${GRAFANA_ROOT_URL:-}
      - AUTH_GOOGLE_CLIENT_ID=${GRAFANA_AUTH_GOOGLE_CLIENT_ID:-}
      - AUTH_GOOGLE_CLIENT_SECRET=${GRAFANA_AUTH_GOOGLE_CLIENT_SECRET:-}
      - AUTH_GOOGLE_ALLOWED_DOMAINS=${GRAFANA_AUTH_GOOGLE_ALLOWED_DOMAINS:-}

volumes:
  prometheus_data:
  grafana_data:
  tempo_data:
  loki_data:
