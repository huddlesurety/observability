receivers:
  otlp:
    protocols:
      http:
        endpoint: "0.0.0.0:${env:PORT}"

exporters:
  # Exposes metrics at :8889/metrics for Prometheus to scrape (pull model)
  prometheus:
    endpoint: "0.0.0.0:${env:PROMETHEUS_EXPORTER_PORT}"

  # Pushes traces to Tempo's OTLP receiver (dedicated port, separate from Tempo's query API)
  otlp_http/tempo:
    endpoint: "${env:TEMPO_ENDPOINT}"

  # Pushes logs to Loki's OTLP endpoint (served on Loki's main HTTP port at /otlp)
  otlp_http/loki:
    endpoint: "${env:LOKI_ENDPOINT}"

processors:
  batch:

extensions:
  health_check:
    endpoint: "0.0.0.0:${env:HEALTH_CHECK_PORT}"

service:
  extensions: [health_check]
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_http/tempo]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_http/loki]
