receivers:
  otlp:
    protocols:
      http:
        endpoint: "0.0.0.0:${env:PORT}"

exporters:
  prometheus:
    endpoint: "0.0.0.0:${env:PROMETHEUS_EXPORTER_PORT}"

  otlp_http/tempo:
    endpoint: "${env:TEMPO_ENDPOINT}"

  otlp_http/loki:
    endpoint: "${env:LOKI_ENDPOINT}"

processors:
  batch:
  transform:
    error_mode: ignore
    metric_statements:
      - context: datapoint
        statements:
          - set(attributes["service_name"], resource.attributes["service.name"])
          - set(attributes["deployment_environment"], resource.attributes["deployment.environment"])

extensions:
  health_check:
    endpoint: "0.0.0.0:${env:HEALTH_CHECK_PORT}"

service:
  extensions: [health_check]
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch, transform]
      exporters: [prometheus]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_http/tempo]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_http/loki]
