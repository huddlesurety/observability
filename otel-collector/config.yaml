receivers:
  otlp:
    protocols:
      http:
        endpoint: "0.0.0.0:${env:PORT}"
        cors:
          allowed_origins:
            - "http://localhost:3000"
            - "https://app.staging.huddlesurety.co"
            - "https://app.huddlesurety.co"
          allowed_headers:
            - "*"

exporters:
  prometheus:
    endpoint: "0.0.0.0:${env:PROMETHEUS_EXPORTER_PORT}"

  otlp_http/tempo:
    endpoint: "${env:TEMPO_ENDPOINT}"

  otlp_http/loki:
    endpoint: "${env:LOKI_ENDPOINT}"

processors:
  batch:
  transform:
    error_mode: ignore
    metric_statements:
      - context: datapoint
        statements:
          - set(attributes["service_name"], resource.attributes["service.name"])
          - set(attributes["deployment_environment"], resource.attributes["deployment.environment"])

connectors:
  spanmetrics:
    dimensions:
      - name: http.method
      - name: http.route
      - name: http.status_code

service:
  pipelines:
    metrics:
      receivers: [otlp, spanmetrics]
      processors: [batch, transform]
      exporters: [prometheus]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_http/tempo, spanmetrics]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_http/loki]
